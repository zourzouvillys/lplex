version: "2"

linters:
  default: standard
  settings:
    errcheck:
      exclude-functions:
        # Writes to stdout/stderr/bufio in CLI display code.
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (*bufio.Writer).Flush
        - (*bufio.Writer).WriteString
        - io.WriteString
