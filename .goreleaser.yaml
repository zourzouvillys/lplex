version: 2

builds:
  - id: lplex
    main: ./cmd/lplex
    binary: lplex
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  - id: lplexdump
    main: ./cmd/lplexdump
    binary: lplexdump
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    ids:
      - lplex
      - lplexdump
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

nfpms:
  - id: lplex-deb
    package_name: lplex
    ids:
      - lplex
      - lplexdump
    vendor: Theo Zourzouvillys
    homepage: https://github.com/sixfathoms/lplex
    maintainer: Theo Zourzouvillys
    description: CAN bus HTTP bridge for NMEA 2000
    license: MIT
    formats:
      - deb
    contents:
      - src: packaging/lplex.service
        dst: /lib/systemd/system/lplex.service
      - src: packaging/lplex.default
        dst: /etc/default/lplex
        type: config
    scripts:
      postinstall: packaging/postinstall.sh

dockers_v2:
  - images:
      - "ghcr.io/sixfathoms/lplex"
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    dockerfile: Dockerfile
    extra_files:
      - go.mod
      - go.sum
      - cmd/
      - internal/
      - lplexc/

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
